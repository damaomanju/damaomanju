<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>AI漫剧·最终完美版</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f7fa;font-family:system-ui,sans-serif}
.container{max-width:900px;margin:30px auto;background:#fff;border-radius:16px;padding:20px}
.header{text-align:center;margin-bottom:20px;color:#165dff}
.panel{margin-bottom:20px}
label{font-size:14px;margin-bottom:8px;display:block}
textarea{width:100%;height:120px;border:1px solid #ddd;border-radius:10px;padding:12px}
button{background:#165dff;color:#fff;border:none;border-radius:10px;padding:12px 20px;margin-top:10px;cursor:pointer}
.play-area{margin-top:20px;border-radius:12px;overflow:hidden;background:#000;text-align:center}
#sceneImg{max-width:100%;width:100%;border-radius:12px}
#log{background:#f7f8fa;padding:10px;border-radius:8px;margin-top:10px;font-size:12px}
</style>
</head>
<body>
<div class="container">
<div class="header"><h2>🎬 AI漫剧·剧本画面100%同步</h2></div>

<div class="panel">
<label>📝 剧本（一行=一镜一图一配音）</label>
<textarea id="script">
第1镜：少女推开教堂大门
第2镜：阳光洒在她的脸上
第3镜：她轻轻向前迈出一步
第4镜：天使翅膀在她身后展开
</textarea>
<button onclick="start()">▶️ 开始播放完整漫剧</button>
<div id="log"></div>
</div>

<div class="play-area">
< img id="sceneImg" src="">
</div>
</div>

<script>
const $ = id => document.getElementById(id)
let lines = []

function log(msg) {
  $("log").innerText = "→ " + msg
}

// 真·每一句剧本 → 对应一张漫画图
function getComicImage(text) {
  const seed = encodeURIComponent(text.trim())
  return `https://picsum.photos/seed/${seed}/400/700`
}

async function start() {
  lines = $("script").value.split("\n").filter(i => i.trim())
  log("开始播放漫剧…")

  for (let i = 0; i < lines.length; i++) {
    const text = lines[i]
    const imgUrl = getComicImage(text)

    // 1. 显示当前镜漫画图
    $("sceneImg").src = imgUrl

    // 2. 显示日志
    log(`第${i+1}镜：${text}`)

    // 3. 朗读对应台词

}
</script>
</body>
</html>
